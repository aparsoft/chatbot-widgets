<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aparsoft Chatbot Widget -- Vanilla HTML Example</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #1a1a2e; }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>Aparsoft Chatbot Widget Demo</h1>
  <p>This page demonstrates the Aparsoft AI chatbot widget loaded via a single <code>&lt;script&gt;</code> tag.</p>
  <p>Replace <code>YOUR_PUBLIC_API_KEY</code> with your actual API key from the <a href="https://chatbot.aparsoft.com" target="_blank">Aparsoft dashboard</a>.</p>

  <!-- Aparsoft Chatbot Widget -->
  <script
    src="https://www.aparsoft.com/static/chatbot-widget/widget.loader.js"
    data-aparsoft-chatbot="true"
    data-api-key="YOUR_PUBLIC_API_KEY"
    data-position="bottom-right"
    data-show-branding="true"
    async
  ></script>
</body>
</html>
